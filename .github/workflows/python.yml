name: Lint Python
on:
   push:
   pull_request:
jobs:
  lint:
   runs-on: ubuntu-latest
   steps:
     - name: Obter o Código
       uses: actions/checkout@v4 # 1. baixa o código
     
     - name: Configurar Python
       uses: actions/setup-python@v5 # 2. instala Python
       with:
           python-version: '3.11'
     
     - name: Instalar flake8
       run: pip install flake8 # 3. instala o linter
 
     - name: Executar lint
       run: flake8 . --max-line-length=88 --exclude=.git,__pycache__ 
