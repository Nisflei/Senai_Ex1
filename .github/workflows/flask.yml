name: Testes Python
on: [push, pull_request]
jobs:
 test:
  runs-on: ubuntu-latest
  steps:
   - uses: actions/checkout@v4
   - uses: actions/setup-python@v5
     with:
       python-version: '3.11'
       cache: 'pip' # ← cache automático de dependências!
   - name: Instalar dependências
     run: |
       pip install -r requirements.txt
       pip install pytest pytest-cov
   - name: Executar testes com cobertura
     run: pytest . --cov=app --cov-report=xml --junitxml=report.xml 
     
   - name: Publicar relatório de testes
     uses: actions/upload-artifact@v4 # salva para download
     if: always() # roda mesmo se testes falharem
     with:
       name: relatorio-testes
       path: |
         report.xml
         coverage.xml
